<div class="min-h-screen flex flex-col page-pattern">
  <!-- Header con gradiente institucional -->
  <header class="header-gradient text-white shadow-lg sticky top-0 z-50">
    <div class="flex items-center justify-between px-6 py-4">
      <div class="flex items-center gap-4">
        <button 
          (click)="toggleSidebar()" 
          class="p-2 hover:bg-white/10 rounded-lg transition-colors border border-white/10"
          title="Colapsar menú"
        >
          <ng-icon [name]="collapsed() ? 'lucideChevronRight' : 'lucideChevronLeft'" class="text-xl"></ng-icon>
        </button>
        
        <div class="flex items-center gap-3 ml-2">
          <!-- Logo con filtro para blanco -->
          <img src="/assets/fise-logo.png" alt="FISE" class="h-10 brightness-0 invert hidden sm:block">
          <div class="h-8 w-[1px] bg-white/20 hidden lg:block mx-1"></div>
          <h1 class="font-display text-xl font-extrabold tracking-tight hidden md:block">
            DocuFISE <span class="text-secondary font-bold">2026</span>
          </h1>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <div class="hidden sm:flex flex-col items-end mr-2">
          <span class="font-display text-sm font-bold">{{ user()?.nombre }}</span>
          <span 
            class="font-ui text-[10px] uppercase font-bold tracking-widest px-2 py-0.5 rounded-full border"
            [ngClass]="getRoleStyle(user()?.rol)"
          >
            {{ user()?.rol }}
          </span>
        </div>
        
        <div class="h-10 w-10 rounded-xl bg-white/10 flex items-center justify-center border border-white/20 shadow-inner">
          <ng-icon name="lucideUser" class="text-xl text-secondary"></ng-icon>
        </div>

        <div class="h-8 w-[1px] bg-white/20"></div>

        <button 
          (click)="logout()" 
          class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-destructive/80 hover:text-white transition-all text-sm font-ui font-semibold group border border-transparent hover:border-destructive"
        >
          <ng-icon name="lucideLogOut" class="text-lg group-hover:scale-110 transition-transform"></ng-icon>
          <span class="hidden md:block">Salir</span>
        </button>
      </div>
    </div>
    
    <!-- Accent bar de 5 colores -->
    <div class="flex h-1.5 w-full">
      <div class="flex-1 bg-[#2C5AAB]"></div>
      <div class="flex-1 bg-[#0FAEBF]"></div>
      <div class="flex-1 bg-[#F2B801]"></div>
      <div class="flex-1 bg-[#0FBF90]"></div>
      <div class="flex-1 bg-[#AB2741]"></div>
    </div>
  </header>

  <div class="flex flex-1 relative overflow-hidden">
    <!-- Sidebar Institucional -->
    <aside 
      class="bg-[#1a2b4b] text-slate-300 border-r border-[#2C5AAB]/30 flex flex-col transition-all duration-300 ease-in-out shadow-2xl z-40 shrink-0"
      [ngClass]="collapsed() ? 'w-20' : 'w-72'"
    >
      <div class="p-4 flex flex-col gap-6 flex-1 overflow-y-auto overflow-x-hidden sidebar-scroll">
        <!-- Label Módulos -->
        <div class="px-3" *ngIf="!collapsed()">
          <h3 class="text-[10px] font-ui font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
            Módulos del Sistema
            <div class="flex-1 h-[1px] bg-slate-800"></div>
          </h3>
        </div>

        <nav class="space-y-1">
          @for (menu of menus(); track menu.id) {
            <!-- Separación para Mantenimiento -->
            <div class="mt-8 mb-2 px-3" *ngIf="!collapsed() && menu.id === 'MNU-04'">
              <h3 class="text-[10px] font-ui font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                Mantenimiento
                <div class="flex-1 h-[1px] bg-slate-800"></div>
              </h3>
            </div>

            <a 
              [routerLink]="menu.ruta" 
              routerLinkActive="active-link"
              class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all group relative hover:text-white"
              [title]="collapsed() ? menu.nombre : ''"
            >
              <div class="flex items-center justify-center w-8 h-8 shrink-0">
                <ng-icon [name]="getMenuIcon(menu.icono)" class="text-xl transition-transform group-hover:scale-110"></ng-icon>
              </div>
              <span class="font-ui font-semibold text-sm transition-all duration-300" 
                    [ngClass]="collapsed() ? 'opacity-0 invisible w-0' : 'opacity-100 visible flex-1'">
                {{ menu.nombre }}
              </span>
              
              <!-- Active state indicator bar -->
              <div class="active-indicator absolute left-0 top-1/2 -translate-y-1/2 w-1.5 h-8 bg-secondary rounded-r-lg opacity-0 transition-opacity"></div>
            </a>
          }
        </nav>
      </div>

      <!-- Footer del Sidebar -->
      <div class="p-4 border-t border-slate-800 bg-[#16233d]">
        <div class="flex items-center gap-3" [ngClass]="collapsed() ? 'justify-center' : 'px-2'">
          <div class="w-2 h-2 rounded-full bg-success animate-pulse shadow-[0_0_10px_rgba(15,191,144,0.5)]"></div>
          <span class="text-[10px] font-ui font-bold uppercase tracking-wider text-slate-500" *ngIf="!collapsed()">
            Sistema Activo · v2.0
          </span>
        </div>
      </div>
    </aside>

    <!-- Main Content con scroll independiente -->
    <main class="flex-1 overflow-y-auto">
      <div class="max-w-[1600px] mx-auto p-4 md:p-8 animate-in fade-in duration-500">
        <router-outlet></router-outlet>
      </div>

      <!-- Footer Institucional -->
      <footer class="footer-gradient text-white/70 py-6 border-t border-white/5">
        <div class="max-w-[1600px] mx-auto px-8 flex flex-col md:flex-row items-center justify-between gap-4">
          <div class="flex items-center gap-3">
            <span class="text-xs font-ui font-bold uppercase tracking-widest">© 2026 DocuFISE</span>
            <div class="h-4 w-[1px] bg-white/10 hidden md:block"></div>
            <p class="text-[11px] font-body">Fondo de Inclusión Social Energético</p>
          </div>
          
          <div class="flex items-center gap-6">
            <a href="#" class="text-[11px] font-ui hover:text-secondary transition-colors uppercase tracking-wider font-bold">Ayuda</a>
            <a href="#" class="text-[11px] font-ui hover:text-secondary transition-colors uppercase tracking-wider font-bold">Privacidad</a>
            <div class="flex items-center gap-2">
              <div class="h-8 w-8 rounded-lg bg-white/5 flex items-center justify-center hover:bg-white/10 cursor-pointer transition-colors border border-white/10">
                <ng-icon name="lucideInfo" class="text-sm"></ng-icon>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Accent bar inferior -->
        <div class="flex h-1 w-full mt-6 opacity-50">
          <div class="flex-1 bg-[#2C5AAB]"></div>
          <div class="flex-1 bg-[#0FAEBF]"></div>
          <div class="flex-1 bg-[#F2B801]"></div>
          <div class="flex-1 bg-[#0FBF90]"></div>
          <div class="flex-1 bg-[#AB2741]"></div>
        </div>
      </footer>
    </main>
  </div>
</div>
